server {
    listen 80;
    server_name _;

    # Long timeouts — video generation can take up to 10 minutes
    proxy_read_timeout    600s;
    proxy_send_timeout    600s;
    proxy_connect_timeout  60s;
    send_timeout          600s;
    client_max_body_size   10m;

    # API routes -> Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        add_header         Access-Control-Allow-Origin *;
    }

    # Output files -> Node.js
    location /output/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_buffering    off;
        add_header         Access-Control-Allow-Origin *;
    }

    # Everything else -> simple info page
    location / {
        default_type text/plain;
        return 200 "Arabic Shorts Generator API\n\nEndpoints:\n  POST /api/video   - Generate video\n  GET  /api/status/:jobId - Check job status\n  GET  /api/health  - Health check\n";
    }
}
