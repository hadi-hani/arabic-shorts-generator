services:
  app:
    build: .
    container_name: arabic-shorts-generator
    ports:
      - "8282:80"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-placeholder}
      - GOOGLE_TTS_KEY=${GOOGLE_TTS_KEY:-placeholder}
      - PEXELS_API_KEY=${PEXELS_API_KEY:-placeholder}
      - PORT=3001
    volumes:
      - ./backend/output:/app/output
      - ./backend/temp:/app/temp
      - ./backend/data:/app/data
    restart: unless-stopped
